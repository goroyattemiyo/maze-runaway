<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>矢印パズル サンプル</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #333; }
        #gameCanvas {
            background-color: #ffffff;
            border: 3px solid #333;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: block;
            margin: 20px auto;
            cursor: pointer;
        }
        .btn {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn:hover { background-color: #27ae60; }
        #message {
            font-size: 18px;
            color: #e74c3c;
            font-weight: bold;
            height: 20px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <h1>矢印パズル（ベース）</h1>
    <div id="message"></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <br>
    <button class="btn" onclick="resetGame()">ステージをリセット</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const messageDiv = document.getElementById('message');

        const gridCount = 5; // 5x5のマス目
        const cellSize = 60; // 1マスのサイズ
        const offset = 50;  // 画面の余白

        // 矢印のデータ
        let arrows = [];

        function resetGame() {
            messageDiv.innerText = "";
            arrows = [
                {
                    id: 1,
                    cells: [{x:1, y:2}, {x:2, y:2}, {x:3, y:2}], // 青い矢印の体
                    dir: 'right', dx: 1, dy: 0,
                    color: '#3498db', moving: false, moveOffset: 0, gone: false
                },
                {
                    id: 2,
                    cells: [{x:2, y:4}, {x:2, y:3}], // 赤い矢印の体
                    dir: 'up', dx: 0, dy: -1,
                    color: '#e74c3c', moving: false, moveOffset: 0, gone: false
                }
            ];
        }

        // 描画処理
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. マス目（グリッド）を描画
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;
            for(let i=0; i<=gridCount; i++) {
                ctx.beginPath();
                ctx.moveTo(offset + i*cellSize, offset);
                ctx.lineTo(offset + i*cellSize, offset + gridCount*cellSize);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(offset, offset + i*cellSize);
                ctx.lineTo(offset + gridCount*cellSize, offset + i*cellSize);
                ctx.stroke();
            }

            // 2. 矢印を描画
            arrows.forEach(arrow => {
                if(arrow.gone) return;

                ctx.strokeStyle = arrow.color;
                ctx.fillStyle = arrow.color;
                ctx.lineWidth = 14;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                // 体（ライン）を描く
                ctx.beginPath();
                arrow.cells.forEach((cell, index) => {
                    let x = offset + cell.x * cellSize + cellSize/2;
                    let y = offset + cell.y * cellSize + cellSize/2;
                    if(arrow.moving) {
                        x += arrow.dx * arrow.moveOffset;
                        y += arrow.dy * arrow.moveOffset;
                    }
                    if(index === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.stroke();

                // 頭（矢印の先端）を描く
                let head = arrow.cells[arrow.cells.length - 1];
                let hx = offset + head.x * cellSize + cellSize/2;
                let hy = offset + head.y * cellSize + cellSize/2;
                if(arrow.moving) {
                    hx += arrow.dx * arrow.moveOffset;
                    hy += arrow.dy * arrow.moveOffset;
                }

                ctx.beginPath();
                const size = 12;
                if(arrow.dir === 'right') {
                    ctx.moveTo(hx + size, hy); ctx.lineTo(hx - size, hy - size); ctx.lineTo(hx - size, hy + size);
                } else if(arrow.dir === 'up') {
                    ctx.moveTo(hx, hy - size); ctx.lineTo(hx - size, hy + size); ctx.lineTo(hx + size, hy + size);
                }
                ctx.fill();
            });
        }

        // 衝突判定（行く先に他の矢印がないか）
        function checkCollision(arrow) {
            let head = arrow.cells[arrow.cells.length - 1];
            let cx = head.x + arrow.dx;
            let cy = head.y + arrow.dy;

            // 画面外に出るまで、その方向のマスをチェック
            while(cx >= 0 && cx < gridCount && cy >= 0 && cy < gridCount) {
                for(let other of arrows) {
                    if(other.id === arrow.id || other.gone) continue;
                    for(let cell of other.cells) {
                        if(cell.x === cx && cell.y === cy) return true; // 他の矢印にぶつかった！
                    }
                }
                cx += arrow.dx;
                cy += arrow.dy;
            }
            return false;
        }

        // クリックイベント
        canvas.addEventListener('click', (e) => {
            messageDiv.innerText = "";
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            // クリック位置をグリッド座標に変換
            const gx = Math.floor((mx - offset) / cellSize);
            const gy = Math.floor((my - offset) / cellSize);

            arrows.forEach(arrow => {
                if(arrow.gone || arrow.moving) return;

                // 矢印の体のどこかがクリックされたか
                const clicked = arrow.cells.some(cell => cell.x === gx && cell.y === gy);
                if(clicked) {
                    if(!checkCollision(arrow)) {
                        arrow.moving = true; // 出発！
                    } else {
                        messageDiv.innerText = "道が塞がれています！";
                    }
                }
            });
        });

        // ゲームループ（アニメーション）
        function loop() {
            arrows.forEach(arrow => {
                if(arrow.moving) {
                    arrow.moveOffset += 8; // 動くスピード
                    // 画面外（400px）に出たら消去
                    if(arrow.moveOffset > 400) {
                        arrow.gone = true;
                        arrow.moving = false;
                    }
                }
            });
            draw();
            requestAnimationFrame(loop);
        }

        // 初期化
        resetGame();
        loop();
    </script>
</body>
</html>
