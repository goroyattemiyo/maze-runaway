<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>矢印パズル - 極限難易度</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            background-color: #f7f9fc;
            margin: 0;
            padding: 20px;
            /* クリック時の青い反転（選択状態）を防止 */
            user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
        }
        h1 { color: #2c3e50; font-size: 22px; margin-bottom: 10px; }
        
        .controls { margin-bottom: 15px; }
        
        #gameCanvas {
            background-color: #ffffff;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: block;
            margin: 0 auto;
            cursor: pointer;
            /* キャンバス上でのタップによる拡大などを防止 */
            touch-action: manipulation;
        }
        
        .btn {
            padding: 10px 18px;
            font-size: 14px;
            margin: 0 5px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover { background-color: #34495e; }
        .btn.active { background-color: #e74c3c; font-weight: bold; }
        
        #message {
            font-size: 16px;
            color: #e74c3c;
            font-weight: bold;
            height: 24px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>矢印パズル - 極限難易度</h1>

    <div class="controls">
        <button class="btn active" id="btn-normal" onclick="setDifficulty('normal')">通常 (12x12)</button>
        <button class="btn" id="btn-large" onclick="setDifficulty('large')">大型 (20x20)</button>
        <button class="btn" id="btn-mega" onclick="setDifficulty('mega')">巨大 (30x30)</button>
        <button class="btn" id="btn-extreme" onclick="setDifficulty('extreme')">極限 (30x45)</button>
    </div>

    <canvas id="gameCanvas" width="800" height="800"></canvas>
    <div id="message"></div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const messageDiv = document.getElementById('message');

        // デフォルト設定
        let gridX = 12; // 横のマス数
        let gridY = 12; // 縦のマス数
        let numArrows = 20;
        let cellSize = 50;
        const offset = 40; 
        
        let arrows = [];
        let goneArrows = 0;
        let currentMode = 'normal';

        function setDifficulty(mode) {
            currentMode = mode;
            // ボタンの見た目更新
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');

            if (mode === 'normal') {
                gridX = 12; gridY = 12; numArrows = 25; cellSize = 600 / gridX;
            } else if (mode === 'large') {
                gridX = 20; gridY = 20; numArrows = 70; cellSize = 700 / gridX;
            } else if (mode === 'mega') {
                gridX = 30; gridY = 30; numArrows = 150; cellSize = 750 / gridX;
            } else if (mode === 'extreme') {
                gridX = 30; gridY = 45; numArrows = 250; cellSize = 800 / gridX; // 縦長
            }
            
            canvas.width = gridX * cellSize + offset * 2;
            canvas.height = gridY * cellSize + offset * 2;
            resetGame();
        }

        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min)) + min;
        }

        function generateStage() {
            arrows = [];
            goneArrows = 0;
            const gridStatus = new Array(gridX).fill(0).map(() => new Array(gridY).fill(null));

            for (let i = 0; i < numArrows; i++) {
                let success = false;
                let attempts = 0;
                while (!success && attempts < 50) {
                    attempts++;
                    const dirIndices = [0, 1, 2, 3];
                    const startDirIdx = dirIndices[getRandomInt(0, 4)];
                    let startPos, rev_v, actual_dir;

                    if (startDirIdx === 0) { // left
                        startPos = { x: 0, y: getRandomInt(0, gridY) };
                        rev_v = { x: 1, y: 0 }; actual_dir = 'left';
                    } else if (startDirIdx === 1) { // right
                        startPos = { x: gridX - 1, y: getRandomInt(0, gridY) };
                        rev_v = { x: -1, y: 0 }; actual_dir = 'right';
                    } else if (startDirIdx === 2) { // top
                        startPos = { x: getRandomInt(0, gridX), y: 0 };
                        rev_v = { x: 0, y: 1 }; actual_dir = 'up';
                    } else { // bottom
                        startPos = { x: getRandomInt(0, gridX), y: gridY - 1 };
                        rev_v = { x: 0, y: -1 }; actual_dir = 'down';
                    }

                    if (gridStatus[startPos.x][startPos.y] !== null) continue;
                    
                    let points = [startPos];
                    let currentCells = [{x: startPos.x, y: startPos.y}];
                    gridStatus[startPos.x][startPos.y] = i + 1;
                    
                    let currPoint = startPos;
                    let curr_v = {x: rev_v.x, y: rev_v.y};
                    let segments = getRandomInt(2, 6); // 曲がる回数を増やす

                    for(let s=0; s<segments; s++) {
                        let len = getRandomInt(2, 7);
                        for(let k=0; k<len; k++) {
                            let nextX = currPoint.x + curr_v.x;
                            let nextY = currPoint.y + curr_v.y;
                            if(nextX < 0 || nextX >= gridX || nextY < 0 || nextY >= gridY || gridStatus[nextX][nextY] !== null) break;
                            gridStatus[nextX][nextY] = i + 1;
                            currentCells.push({x: nextX, y: nextY});
                            currPoint = {x: nextX, y: nextY};
                        }
                        points.push(currPoint);
                        // 次の曲がり方向
                        curr_v = (curr_v.x === 0) ? {x: (Math.random() < 0.5 ? 1 : -1), y: 0} : {x: 0, y: (Math.random() < 0.5 ? 1 : -1)};
                    }

                    if (currentCells.length < 3) {
                        currentCells.forEach(c => gridStatus[c.x][c.y] = null);
                        continue;
                    }

                    arrows.push({
                        id: i + 1, points: points, dir: actual_dir,
                        color: currentMode === 'extreme' ? '#333' : '#333', // 色を統一（迷路感を出す）
                        moving: false, moveOffset: 0, gone: false
                    });
                    success = true;
                }
            }
            arrows.reverse();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#eee';
            ctx.lineWidth = 1;
            for(let i=0; i<=gridX; i++) {
                ctx.beginPath();
                ctx.moveTo(offset + i*cellSize, offset); ctx.lineTo(offset + i*cellSize, offset + gridY*cellSize); ctx.stroke();
            }
            for(let j=0; j<=gridY; j++) {
                ctx.beginPath();
                ctx.moveTo(offset, offset + j*cellSize); ctx.lineTo(offset + gridX*cellSize, offset + j*cellSize); ctx.stroke();
            }

            arrows.forEach(arrow => {
                if(arrow.gone) return;
                ctx.strokeStyle = arrow.color; ctx.fillStyle = arrow.color;
                ctx.lineWidth = cellSize * 0.4; // マス目に合わせた太さ
                ctx.lineCap = 'round'; ctx.lineJoin = 'round';

                const mv = arrow.moving ? getVelocityForDir(arrow.dir) : {dx: 0, dy: 0};
                const mx = mv.dx * arrow.moveOffset; const my = mv.dy * arrow.moveOffset;

                ctx.beginPath();
                arrow.points.forEach((p, idx) => {
                    let x = offset + p.x * cellSize + cellSize/2 + mx;
                    let y = offset + p.y * cellSize + cellSize/2 + my;
                    if(idx === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                });
                ctx.stroke();

                const head = arrow.points[0];
                let hx = offset + head.x * cellSize + cellSize/2 + mx;
                let hy = offset + head.y * cellSize + cellSize/2 + my;
                ctx.beginPath();
                const s = cellSize * 0.35;
                if(arrow.dir === 'right') { ctx.moveTo(hx+s, hy); ctx.lineTo(hx-s, hy-s); ctx.lineTo(hx-s, hy+s); }
                else if(arrow.dir === 'left') { ctx.moveTo(hx-s, hy); ctx.lineTo(hx+s, hy-s); ctx.lineTo(hx+s, hy+s); }
                else if(arrow.dir === 'up') { ctx.moveTo(hx, hy-s); ctx.lineTo(hx-s, hy+s); ctx.lineTo(hx+s, hy+s); }
                else if(arrow.dir === 'down') { ctx.moveTo(hx, hy+s); ctx.lineTo(hx-s, hy-s); ctx.lineTo(hx+s, hy-s); }
                ctx.fill();
            });
        }

        function getVelocityForDir(dir) {
            return dir === 'right' ? {dx: 1, dy: 0} : dir === 'left' ? {dx: -1, dy: 0} : dir === 'up' ? {dx: 0, dy: -1} : {dx: 0, dy: 1};
        }

        function getCellsForArrow(arrow) {
            let cells = [];
            for (let i = 0; i < arrow.points.length - 1; i++) {
                let p0 = arrow.points[i], p1 = arrow.points[i+1];
                let dx = Math.sign(p1.x - p0.x), dy = Math.sign(p1.y - p0.y);
                let curr = {x: p0.x, y: p0.y};
                while(true) {
                    if(!cells.some(c => c.x === curr.x && c.y === curr.y)) cells.push({x: curr.x, y: curr.y});
                    if(curr.x === p1.x && curr.y === p1.y) break;
                    curr.x += dx; curr.y += dy;
                }
            }
            return cells;
        }

        function checkCollision(arrow) {
            let myCells = getCellsForArrow(arrow);
            let v = getVelocityForDir(arrow.dir);
            let otherGrid = {};
            arrows.forEach(a => { if (a !== arrow && !a.gone) getCellsForArrow(a).forEach(c => otherGrid[`${c.x},${c.y}`] = true); });

            let temp = myCells.map(c => ({...c}));
            // グリッドを抜けるのに十分なステップ
            for(let s=0; s < Math.max(gridX, gridY)*2; s++) {
                temp.forEach(c => { c.x += v.dx; c.y += v.dy; });
                if(temp.every(c => c.x < 0 || c.x >= gridX || c.y < 0 || c.y >= gridY)) return false;
                if(temp.some(c => otherGrid[`${c.x},${c.y}`])) return true;
            }
            return false;
        }

        canvas.addEventListener('mousedown', (e) => {
            messageDiv.innerText = "";
            const rect = canvas.getBoundingClientRect();
            const gx = Math.floor((e.clientX - rect.left - offset) / cellSize);
            const gy = Math.floor((e.clientY - rect.top - offset) / cellSize);

            for(let arrow of arrows) {
                if(arrow.gone || arrow.moving) continue;
                if(getCellsForArrow(arrow).some(c => c.x === gx && c.y === gy)) {
                    if(!checkCollision(arrow)) arrow.moving = true;
                    else messageDiv.innerText = "道が塞がれています！";
                    return;
                }
            }
        });

        function resetGame() { messageDiv.innerText = ""; generateStage(); }

        function loop() {
            arrows.forEach(a => {
                if(a.moving) {
                    a.moveOffset += cellSize * 0.5;
                    if(a.moveOffset > Math.max(canvas.width, canvas.height)) { a.gone = true; a.moving = false; goneArrows++; if(goneArrows === numArrows) messageDiv.innerText = "CLEAR!"; }
                }
            });
            draw();
            requestAnimationFrame(loop);
        }

        setDifficulty('extreme'); // デフォルトを極限に
        loop();
    </script>
</body>
</html>
